name: generate snake

on:
  schedule:
    - cron: '30 3 * * *'   # daily at 03:30 UTC (13 min after readme updater)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/snake.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: HaiNick
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd7ff,#6ab0ff,#2876cc,#0e4a8a,#0f172a

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
